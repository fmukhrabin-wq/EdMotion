<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EdMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg:      #080f1c;
      --surface: #0d1829;
      --card:    #111e30;
      --border:  rgba(255,255,255,0.07);
      --muted:   #64748b;
      --text:    #e2eaf6;
      --accent:  #6ee7b7;
      --blue:    #60a5fa;
      --red:     #f87171;
      --green:   #6ee7b7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Sora', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow-x: hidden; position: relative;
    }

    .bg-glow { position:fixed;inset:0;pointer-events:none;z-index:0; }
    .glow-orb { position:absolute;border-radius:50%;filter:blur(90px);opacity:0.18;animation:floatOrb 12s ease-in-out infinite; }
    .glow-orb.a { width:500px;height:500px;background:radial-gradient(circle,#60a5fa,transparent);top:-120px;left:-100px;animation-delay:0s; }
    .glow-orb.b { width:380px;height:380px;background:radial-gradient(circle,#6ee7b7,transparent);bottom:-80px;right:-60px;animation-delay:-5s; }
    .glow-orb.c { width:260px;height:260px;background:radial-gradient(circle,#a78bfa,transparent);top:50%;left:60%;animation-delay:-9s; }
    @keyframes floatOrb {
      0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-30px) scale(1.06);}66%{transform:translate(-20px,20px) scale(0.96);}
    }
    .bg-grid {
      position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:linear-gradient(rgba(96,165,250,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,0.04) 1px,transparent 1px);
      background-size:48px 48px;
    }

    .auth-card {
      position:relative;z-index:10;width:100%;max-width:440px;
      background:var(--card);border:1px solid var(--border);border-radius:22px;padding:42px 36px;
      box-shadow:0 0 0 1px rgba(96,165,250,0.06),0 32px 64px rgba(0,0,0,0.5),0 0 80px rgba(96,165,250,0.06);
      animation:cardIn .55s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn { from{transform:translateY(32px) scale(0.97);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;} }

    .logo-wrap { display:flex;align-items:center;gap:14px;margin-bottom:28px; }
    .logo-icon {
      width:46px;height:46px;border-radius:12px;
      background:linear-gradient(135deg,var(--accent),var(--blue));
      display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:14px;color:#052e1e;flex-shrink:0;
      box-shadow:0 4px 20px rgba(96,165,250,0.3);
    }
    .logo-text{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
    .logo-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:400;}

    .mode-tabs {
      display:grid;grid-template-columns:1fr 1fr;background:var(--surface);
      border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;
    }
    .mode-tab {
      padding:10px;border-radius:9px;border:none;background:transparent;
      color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;
      transition:all .22s ease;font-family:'Sora',sans-serif;
    }
    .mode-tab.active { background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;box-shadow:0 3px 14px rgba(59,130,246,0.35); }

    .divider {
      display:flex;align-items:center;gap:12px;margin:0 0 18px;
      color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
    }
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

    .role-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
    .role-btn {
      padding:14px 10px;border-radius:14px;border:1.5px solid var(--border);
      background:var(--surface);cursor:pointer;transition:all .2s ease;
      display:flex;flex-direction:column;align-items:center;gap:6px;
    }
    .role-btn:hover{border-color:rgba(96,165,250,0.4);background:rgba(96,165,250,0.05);}
    .role-btn.selected{border-color:var(--blue);background:rgba(96,165,250,0.1);box-shadow:0 0 0 3px rgba(96,165,250,0.12);}
    .role-icon{font-size:26px;} .role-label{font-size:13px;font-weight:700;color:var(--text);}
    .role-desc{font-size:11px;color:var(--muted);text-align:center;}

    .auth-form{display:flex;flex-direction:column;gap:12px;}
    .panel{display:none;}
    .panel.active{display:block;animation:panelIn .3s ease both;}
    @keyframes panelIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    .input-wrap {
      display:flex;align-items:center;gap:10px;background:var(--surface);
      border:1.5px solid var(--border);padding:13px 15px;border-radius:12px;transition:all .2s ease;
    }
    .input-wrap:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(96,165,250,0.12);}
    .input-wrap i{font-size:15px;color:var(--muted);flex-shrink:0;transition:color .2s;}
    .input-wrap:focus-within i{color:var(--blue);}
    .input-wrap input{background:transparent;border:none;flex:1;font-size:14px;outline:none;color:var(--text);font-family:'Sora',sans-serif;}
    .input-wrap input::placeholder{color:var(--muted);}
    .toggle-pass{cursor:pointer;padding:2px;transition:color .2s;}
    .toggle-pass:hover{color:var(--text);}

    .strength-bar{height:4px;border-radius:4px;background:var(--surface);margin-top:-4px;overflow:hidden;display:none;}
    .strength-bar.show{display:block;}
    .strength-fill{height:100%;border-radius:4px;transition:width .3s ease,background .3s ease;width:0%;}
    .strength-label{font-size:11px;color:var(--muted);margin-top:-4px;display:none;}
    .strength-label.show{display:block;}

    .check-row{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--muted);margin-top:-2px;}
    .check-row input[type="checkbox"]{accent-color:var(--blue);width:15px;height:15px;flex-shrink:0;margin-top:1px;cursor:pointer;}
    .check-row a{color:var(--blue);text-decoration:none;} .check-row a:hover{text-decoration:underline;}

    .btn-submit {
      margin-top:4px;padding:14px;border-radius:12px;border:none;
      background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;
      font-size:15px;font-weight:700;cursor:pointer;transition:all .2s ease;
      font-family:'Sora',sans-serif;position:relative;overflow:hidden;
      box-shadow:0 4px 20px rgba(59,130,246,0.35);
    }
    .btn-submit::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);opacity:0;transition:opacity .2s;}
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(59,130,246,0.45);}
    .btn-submit:hover::after{opacity:1;} .btn-submit:active{transform:translateY(0);}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
    .btn-submit .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .btn-submit.loading .btn-text{display:none;} .btn-submit.loading .spinner{display:block;}

    .alert{display:none;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;}
    .alert.show{display:block;}
    .alert.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red);animation:shake .35s ease;}
    .alert.success{background:rgba(110,231,183,0.1);border:1px solid rgba(110,231,183,0.25);color:var(--green);animation:popIn .3s ease;}
    @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
    @keyframes popIn{from{transform:scale(0.95);opacity:0;}to{transform:scale(1);opacity:1;}}

    .switch-link{text-align:center;font-size:12.5px;color:var(--muted);margin-top:16px;}
    .switch-link a{color:var(--blue);font-weight:700;cursor:pointer;text-decoration:none;}
    .switch-link a:hover{text-decoration:underline;}

    @media(max-width:480px){.auth-card{padding:30px 20px;}.role-selector{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<div class="bg-glow">
  <div class="glow-orb a"></div><div class="glow-orb b"></div><div class="glow-orb c"></div>
</div>
<div class="bg-grid"></div>

<div class="auth-card">

  <div class="logo-wrap">
    <div class="logo-icon">EM</div>
    <div>
      <div class="logo-text">EdMotion</div>
      <div class="logo-sub">Platform Pembelajaran Adaptif Berbasis Emosi</div>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tabLogin" onclick="switchMode('login')">Masuk</button>
    <button class="mode-tab" id="tabRegister" onclick="switchMode('register')">Daftar</button>
  </div>

  <!-- ═══ LOGIN ═══ -->
  <div class="panel active" id="panelLogin">
    <div class="divider">Masuk sebagai</div>
    <div class="role-selector">
      <div class="role-btn selected" id="loginRoleAdmin" onclick="selectLoginRole('admin')">
        <span class="role-icon">🛡️</span><span class="role-label">Admin</span><span class="role-desc">Kelola &amp; pantau siswa</span>
      </div>
      <div class="role-btn" id="loginRoleSiswa" onclick="selectLoginRole('siswa')">
        <span class="role-icon">🎓</span><span class="role-label">Siswa</span><span class="role-desc">Ikuti sesi pembelajaran</span>
      </div>
    </div>
    <form id="loginForm" class="auth-form" novalidate>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email" required autocomplete="email">
      </div>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
        <i class="fa-regular fa-eye toggle-pass" id="toggleLoginPass"></i>
      </div>
      <button type="submit" class="btn-submit" id="loginBtn">
        <span class="btn-text">Masuk</span><div class="spinner"></div>
      </button>
    </form>
    <p id="loginMsg" class="alert"></p>
    <div class="switch-link">Belum punya akun? <a onclick="switchMode('register')">Daftar sekarang</a></div>
  </div>

  <!-- ═══ REGISTER ═══ -->
  <div class="panel" id="panelRegister">
    <div class="divider">Daftar sebagai</div>
    <div class="role-selector">
      <div class="role-btn selected" id="regRoleAdmin" onclick="selectRegRole('admin')">
        <span class="role-icon">🛡️</span><span class="role-label">Admin</span><span class="role-desc">Kelola &amp; pantau siswa</span>
      </div>
      <div class="role-btn" id="regRoleSiswa" onclick="selectRegRole('siswa')">
        <span class="role-icon">🎓</span><span class="role-label">Siswa</span><span class="role-desc">Ikuti sesi pembelajaran</span>
      </div>
    </div>
    <form id="registerForm" class="auth-form" novalidate>
      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="regName" placeholder="Nama lengkap" required autocomplete="name">
      </div>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="regEmail" placeholder="Email" required autocomplete="email">
      </div>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="regPassword" placeholder="Buat password (min. 8 karakter)" required autocomplete="new-password">
        <i class="fa-regular fa-eye toggle-pass" id="toggleRegPass"></i>
      </div>
      <div class="strength-bar" id="strengthBar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="regConfirm" placeholder="Konfirmasi password" required autocomplete="new-password">
        <i class="fa-regular fa-eye toggle-pass" id="toggleConfirmPass"></i>
      </div>
      <div class="check-row">
        <input type="checkbox" id="agreeTerms">
        <label for="agreeTerms">Saya menyetujui <a href="#">Syarat &amp; Ketentuan</a> dan <a href="#">Kebijakan Privasi</a> EdMotion</label>
      </div>
      <button type="submit" class="btn-submit" id="registerBtn">
        <span class="btn-text">Buat Akun</span><div class="spinner"></div>
      </button>
    </form>
    <p id="registerMsg" class="alert"></p>
    <div class="switch-link">Sudah punya akun? <a onclick="switchMode('login')">Masuk di sini</a></div>
  </div>

</div>

<script>
  let loginRole = 'admin', registerRole = 'admin';

  function switchMode(mode) {
    const isLogin = mode === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('panelLogin').classList.toggle('active', isLogin);
    document.getElementById('panelRegister').classList.toggle('active', !isLogin);
    clearAlert('loginMsg'); clearAlert('registerMsg');
  }

  function selectLoginRole(role) {
    loginRole = role;
    document.getElementById('loginRoleAdmin').classList.toggle('selected', role === 'admin');
    document.getElementById('loginRoleSiswa').classList.toggle('selected', role === 'siswa');
  }

  function selectRegRole(role) {
    registerRole = role;
    document.getElementById('regRoleAdmin').classList.toggle('selected', role === 'admin');
    document.getElementById('regRoleSiswa').classList.toggle('selected', role === 'siswa');
  }

  function bindToggle(tid, iid) {
    document.getElementById(tid).addEventListener('click', function () {
      const inp = document.getElementById(iid);
      const hidden = inp.type === 'password';
      inp.type = hidden ? 'text' : 'password';
      this.classList.toggle('fa-eye', !hidden);
      this.classList.toggle('fa-eye-slash', hidden);
    });
  }
  bindToggle('toggleLoginPass', 'loginPassword');
  bindToggle('toggleRegPass', 'regPassword');
  bindToggle('toggleConfirmPass', 'regConfirm');

  let passwordStrong = false;

  document.getElementById('regPassword').addEventListener('input', function () {
    const val = this.value;
    const bar   = document.getElementById('strengthBar');
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');

    if (!val) {
      bar.classList.remove('show');
      label.classList.remove('show');
      passwordStrong = false;
      return;
    }

    bar.classList.add('show');
    label.classList.add('show');

    let s = 0;
    if (val.length >= 8)            s++;
    if (/[A-Z]/.test(val))          s++;
    if (/[0-9]/.test(val))          s++;
    if (/[^A-Za-z0-9]/.test(val))   s++;

    const lvls = [
      { pct: '25%',  color: '#f87171', text: '⚠️ Sangat lemah — tambahkan huruf besar, angka, simbol' },
      { pct: '50%',  color: '#fb923c', text: '🔶 Lemah — coba tambahkan angka atau simbol' },
      { pct: '75%',  color: '#facc15', text: '🔷 Cukup kuat — satu lagi untuk mencapai kuat!' },
      { pct: '100%', color: '#6ee7b7', text: '✅ Kuat — password siap digunakan' },
    ];

    const l = lvls[s - 1] || lvls[0];
    fill.style.width      = l.pct;
    fill.style.background = l.color;
    label.textContent     = l.text;
    label.style.color     = l.color;

    passwordStrong = s === 4;
  });

  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert ${type}`;
    void el.offsetWidth;
    el.classList.add('show');
  }

  function clearAlert(id) {
    const el = document.getElementById(id);
    el.className = 'alert';
    el.textContent = '';
  }

  /* ═══ LOGIN ═══ */
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    clearAlert('loginMsg');

    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');

    if (!email || !password) {
      showAlert('loginMsg', 'Email dan password wajib diisi.', 'error');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role: loginRole })
      });
      const text = (await res.text()).trim();

      switch (text) {
        case 'success':
          window.location.href = loginRole === 'admin' ? '/dashboard' : '/dashboard-siswa';
          break;
        case 'user_not_found':
          showAlert('loginMsg', 'Email tidak ditemukan. Periksa kembali.', 'error');
          break;
        case 'wrong_password':
          showAlert('loginMsg', 'Password salah. Coba lagi.', 'error');
          break;
        case 'invalid_input':
          showAlert('loginMsg', 'Email dan password wajib diisi.', 'error');
          break;
        case 'invalid_method':
          showAlert('loginMsg', 'Terjadi kesalahan metode request.', 'error');
          break;
        default:
          showAlert('loginMsg',
            (text.startsWith('db_error:') || text.startsWith('server_error:'))
              ? 'Terjadi kesalahan server. Coba lagi nanti.'
              : 'Login gagal. Silakan coba lagi.',
            'error'
          );
      }
    } catch (err) {
      showAlert('loginMsg', 'Tidak dapat terhubung ke server.', 'error');
      console.error(err);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });

  /* ═══ REGISTER ═══ */
  document.getElementById('registerForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    clearAlert('registerMsg');

    const name     = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm  = document.getElementById('regConfirm').value;
    const agreed   = document.getElementById('agreeTerms').checked;
    const btn      = document.getElementById('registerBtn');

    // Validasi di sisi klien
    if (!name) {
      showAlert('registerMsg', 'Nama lengkap wajib diisi.', 'error'); return;
    }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showAlert('registerMsg', 'Format email tidak valid.', 'error'); return;
    }
    if (registerRole === 'siswa' && !email.includes('@student')) {
      showAlert('registerMsg', 'Akun siswa wajib menggunakan email @student', 'error'); return;
    }
    if (registerRole === 'admin' && email.includes('@student')) {
      showAlert('registerMsg', 'Admin tidak boleh menggunakan email @student.', 'error'); return;
    }
    if (!password || password.length < 8) {
      showAlert('registerMsg', 'Password minimal 8 karakter.', 'error'); return;
    }
    if (!passwordStrong) {
      showAlert('registerMsg', 'Password harus mencapai level Kuat sebelum mendaftar.', 'error'); return;
    }
    if (password !== confirm) {
      showAlert('registerMsg', 'Konfirmasi password tidak cocok.', 'error'); return;
    }
    if (!agreed) {
      showAlert('registerMsg', 'Kamu harus menyetujui Syarat & Ketentuan terlebih dahulu.', 'error'); return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, confirm, role: registerRole })
      });
      const text = (await res.text()).trim();

      switch (text) {
        case 'success':
          showAlert('registerMsg', '🎉 Akun berhasil dibuat! Mengarahkan ke halaman masuk…', 'success');
          setTimeout(() => switchMode('login'), 1800);
          this.reset();
          document.getElementById('strengthBar').classList.remove('show');
          document.getElementById('strengthLabel').classList.remove('show');
          passwordStrong = false;
          break;
        case 'email_sudah_ada':
          showAlert('registerMsg', 'Email ini sudah terdaftar. Silakan masuk.', 'error');
          break;
        case 'invalid_email':
          showAlert('registerMsg', 'Format email tidak valid.', 'error');
          break;
        case 'email_student_required':
          showAlert('registerMsg', 'Email siswa wajib mengandung @student.', 'error');
          break;
        case 'admin_cannot_use_student_email':
          showAlert('registerMsg', 'Admin tidak boleh menggunakan email @student.', 'error');
          break;
        case 'password_too_short':
          showAlert('registerMsg', 'Password minimal 8 karakter.', 'error');
          break;
        case 'password_tidak_cocok':
          showAlert('registerMsg', 'Konfirmasi password tidak cocok.', 'error');
          break;
        case 'invalid_input':
          showAlert('registerMsg', 'Semua field wajib diisi.', 'error');
          break;
        case 'invalid_method':
          showAlert('registerMsg', 'Terjadi kesalahan metode request.', 'error');
          break;
        default:
          showAlert('registerMsg',
            (text.startsWith('db_error:') || text.startsWith('server_error:'))
              ? 'Terjadi kesalahan server. Coba lagi nanti.'
              : 'Pendaftaran gagal. Silakan coba lagi.',
            'error'
          );
      }
    } catch (err) {
      showAlert('registerMsg', 'Tidak dapat terhubung ke server.', 'error');
      console.error(err);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
